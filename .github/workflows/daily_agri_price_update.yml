name: Daily Agri Price Update

run-name: Daily Agri Price Update

on:
  schedule:
    - cron: "40 10 * * *"
      timezone: "Asia/Taipei"

  workflow_dispatch:

jobs:
  update-agri-price:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SMARTBUY_API_MAX_RETRIES: "4"
      SMARTBUY_API_CONNECT_TIMEOUT: "30"
      SMARTBUY_API_READ_TIMEOUT: "90"
      SMARTBUY_API_PAGE_SIZE: "500"
      SMARTBUY_FETCH_LOOKBACK_DAYS: "2"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run agri price update with retry
        shell: bash
        run: |
          for i in 1 2 3; do
            echo "Attempt $i..."
            if python scripts/update_agri_price_daily.py; then
              echo "Update succeeded"
              exit 0
            fi
            echo "Update failed, sleep before retry..."
            sleep 60
          done
          echo "Update failed after 3 attempts"
          exit 1