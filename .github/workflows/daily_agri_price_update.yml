name: Daily Agri Price Update

run-name: Daily Agri Price Update

on:
  schedule:
    # GitHub Actions 使用 UTC
    # 04:30 UTC = 台灣時間 12:30
    - cron: "30 4 * * *"

  workflow_dispatch:

jobs:
  update-agri-price:
    runs-on: ubuntu-latest
    timeout-minutes: 20

  env:
    DATABASE_URL: ${{ secrets.DATABASE_URL }}
    SMARTBUY_API_MAX_RETRIES: "4"
    SMARTBUY_API_CONNECT_TIMEOUT: "30"
    SMARTBUY_API_READ_TIMEOUT: "90"
    SMARTBUY_API_PAGE_SIZE: "500"
    SMARTBUY_FETCH_LOOKBACK_DAYS: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run agri price update
        run: |
          python scripts/update_agri_price_daily.py