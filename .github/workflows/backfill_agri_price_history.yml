name: Backfill Agri Price History

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "開始日期 (YYYY-MM-DD)"
        required: true
        type: string
      end_date:
        description: "結束日期 (YYYY-MM-DD)"
        required: true
        type: string
      mode:
        description: "回補模式 (建議 parquet)"
        required: true
        default: "parquet"
        type: choice
        options:
          - parquet
          - db
          - both

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_PARQUET_PREFIX: ${{ secrets.R2_PARQUET_PREFIX }}
      R2_REQUIRED: "true"
      SMARTBUY_ALLOW_INSECURE_SSL: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run history backfill
        run: |
          python scripts/backfill_agri_price_history.py \
            --start-date "${{ github.event.inputs.start_date }}" \
            --end-date "${{ github.event.inputs.end_date }}" \
            --mode "${{ github.event.inputs.mode }}"
