name: SBIR Official Document Download

on:
  pull_request:
    branches: [main]
    paths:
      - 'sbir-download-trigger.txt'

permissions:
  contents: read

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Install downloader dependencies
        run: python -m pip install --quiet requests beautifulsoup4

      - name: Download SBIR official files
        shell: bash
        run: |
          python - <<'PY'
          import csv
          import os
          import re
          import time
          import urllib.parse
          from pathlib import Path

          import requests
          from bs4 import BeautifulSoup

          BASE = 'https://sbir.org.tw'
          STAGES = {
              '01_申請階段': BASE + '/sbir/dw_apply',
              '02_簽約階段': BASE + '/sbir/dw_contract',
              '03_執行階段': BASE + '/sbir/dw_execute',
          }
          EXTENSIONS = ('.pdf', '.doc', '.docx', '.odt', '.ppt', '.pptx', '.odp', '.xls', '.xlsx', '.ods', '.zip')
          OUT = Path('sbir_official_documents')
          OUT.mkdir(parents=True, exist_ok=True)

          requests.packages.urllib3.disable_warnings(requests.packages.urllib3.exceptions.InsecureRequestWarning)
          session = requests.Session()
          # SBIR 官網目前的憑證鏈在部分 Linux runner 無法通過驗證；僅針對官方網域停用驗證。
          session.verify = False
          session.headers.update({
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/150 Safari/537.36',
              'Accept-Language': 'zh-TW,zh;q=0.9,en;q=0.8',
          })

          def safe_name(name):
              name = urllib.parse.unquote(name).strip()
              name = re.sub(r'[\\/:*?"<>|]+', '_', name)
              name = re.sub(r'\s+', ' ', name)
              return name[:180] or 'unnamed_file'

          def filename_from_response(response, fallback):
              disposition = response.headers.get('content-disposition', '')
              match = re.search(r"filename\*=UTF-8''([^;]+)", disposition, re.I)
              if match:
                  return safe_name(match.group(1))
              match = re.search(r'filename="?([^";]+)', disposition, re.I)
              if match:
                  try:
                      return safe_name(match.group(1).encode('latin1').decode('utf-8'))
                  except Exception:
                      return safe_name(match.group(1))
              return safe_name(fallback)

          all_manifest = []
          for stage, page_url in STAGES.items():
              stage_dir = OUT / stage
              stage_dir.mkdir(parents=True, exist_ok=True)
              rows = []
              try:
                  page = session.get(page_url, timeout=60)
                  page.raise_for_status()
                  page.encoding = page.apparent_encoding or 'utf-8'
                  soup = BeautifulSoup(page.text, 'html.parser')
                  links = soup.find_all('a', href=True)
              except Exception as exc:
                  row = [stage, '', page_url, 'page_failed', 0, str(exc)]
                  rows.append(row)
                  all_manifest.append(row)
                  links = []

              seen = set()
              for link in links:
                  href = link.get('href', '').strip()
                  full = urllib.parse.urljoin(page_url, href)
                  path = urllib.parse.unquote(urllib.parse.urlparse(full).path).lower()
                  if '/download/' not in path or not path.endswith(EXTENSIONS):
                      continue
                  if full in seen:
                      continue
                  seen.add(full)

                  anchor_name = link.get_text(' ', strip=True)
                  url_name = os.path.basename(urllib.parse.urlparse(full).path)
                  fallback = anchor_name if os.path.splitext(anchor_name)[1].lower() in EXTENSIONS else urllib.parse.unquote(url_name)
                  status = 'success'
                  error = ''
                  size = 0
                  destination = None
                  try:
                      response = session.get(full, timeout=120, allow_redirects=True)
                      response.raise_for_status()
                      filename = filename_from_response(response, fallback)
                      if not os.path.splitext(filename)[1]:
                          ext = os.path.splitext(urllib.parse.unquote(url_name))[1]
                          filename += ext
                      destination = stage_dir / filename
                      counter = 2
                      while destination.exists():
                          stem, suffix = os.path.splitext(filename)
                          destination = stage_dir / f'{stem}_{counter}{suffix}'
                          counter += 1
                      destination.write_bytes(response.content)
                      size = destination.stat().st_size
                      if size == 0:
                          raise RuntimeError('empty file')
                  except Exception as exc:
                      status = 'failed'
                      error = str(exc)
                      if destination and destination.exists():
                          destination.unlink()
                  final_name = destination.name if destination else safe_name(fallback)
                  row = [stage, final_name, full, status, size, error]
                  rows.append(row)
                  all_manifest.append(row)
                  print(stage, status, final_name, size)
                  time.sleep(0.1)

              with open(stage_dir / 'manifest.csv', 'w', newline='', encoding='utf-8-sig') as f:
                  writer = csv.writer(f)
                  writer.writerow(['stage', 'filename', 'source_url', 'status', 'size_bytes', 'error'])
                  writer.writerows(rows)
              with open(stage_dir / 'README.txt', 'w', encoding='utf-8') as f:
                  ok = sum(1 for r in rows if r[3] == 'success')
                  fail = sum(1 for r in rows if r[3] != 'success')
                  f.write(f'SBIR 官方文件自動封存\n來源：{page_url}\n成功：{ok}\n失敗：{fail}\n下載日期：2026-07-22\n')

          with open(OUT / 'manifest_all.csv', 'w', newline='', encoding='utf-8-sig') as f:
              writer = csv.writer(f)
              writer.writerow(['stage', 'filename', 'source_url', 'status', 'size_bytes', 'error'])
              writer.writerows(all_manifest)
          PY

      - name: Upload application-stage archive
        uses: actions/upload-artifact@v4
        with:
          name: sbir-application-stage
          path: sbir_official_documents/01_申請階段
          if-no-files-found: error
          retention-days: 7

      - name: Upload contract-stage archive
        uses: actions/upload-artifact@v4
        with:
          name: sbir-contract-stage
          path: sbir_official_documents/02_簽約階段
          if-no-files-found: error
          retention-days: 7

      - name: Upload execution-stage archive
        uses: actions/upload-artifact@v4
        with:
          name: sbir-execution-stage
          path: sbir_official_documents/03_執行階段
          if-no-files-found: error
          retention-days: 7
