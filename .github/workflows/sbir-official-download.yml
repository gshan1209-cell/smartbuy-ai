name: SBIR Official Document Download

on:
  pull_request:
    branches: [main]
    paths:
      - 'sbir-download-trigger.txt'

permissions:
  contents: read

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download SBIR official files
        shell: bash
        run: |
          python - <<'PY'
          import csv
          import os
          import re
          import time
          import urllib.parse
          import urllib.request
          from html.parser import HTMLParser
          from pathlib import Path

          BASE = 'https://sbir.org.tw'
          STAGES = {
              '01_申請階段': BASE + '/sbir/dw_apply',
              '02_簽約階段': BASE + '/sbir/dw_contract',
              '03_執行階段': BASE + '/sbir/dw_execute',
          }
          EXTENSIONS = ('.pdf', '.doc', '.docx', '.odt', '.ppt', '.pptx', '.odp', '.xls', '.xlsx', '.ods', '.zip')
          OUT = Path('sbir_official_documents')
          OUT.mkdir(exist_ok=True)

          class LinkParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.links = []
                  self.href = None
                  self.text = []
              def handle_starttag(self, tag, attrs):
                  if tag.lower() == 'a':
                      self.href = dict(attrs).get('href')
                      self.text = []
              def handle_data(self, data):
                  if self.href is not None:
                      self.text.append(data)
              def handle_endtag(self, tag):
                  if tag.lower() == 'a' and self.href is not None:
                      self.links.append((self.href, ''.join(self.text).strip()))
                      self.href = None
                      self.text = []

          def request(url):
              req = urllib.request.Request(url, headers={
                  'User-Agent': 'Mozilla/5.0 (compatible; SBIR-Archive/1.0)',
                  'Accept-Language': 'zh-TW,zh;q=0.9,en;q=0.8',
              })
              return urllib.request.urlopen(req, timeout=60)

          def safe_name(name):
              name = urllib.parse.unquote(name).strip()
              name = re.sub(r'[\\/:*?"<>|]+', '_', name)
              name = re.sub(r'\s+', ' ', name)
              return name[:180] or 'unnamed_file'

          all_manifest = []
          for stage, page_url in STAGES.items():
              stage_dir = OUT / stage
              stage_dir.mkdir(exist_ok=True)
              html = request(page_url).read().decode('utf-8', errors='replace')
              parser = LinkParser()
              parser.feed(html)
              seen = set()
              rows = []
              for href, text in parser.links:
                  full = urllib.parse.urljoin(page_url, href)
                  path = urllib.parse.urlparse(full).path.lower()
                  if '/download/' not in path or not path.endswith(EXTENSIONS):
                      continue
                  if full in seen:
                      continue
                  seen.add(full)
                  url_name = os.path.basename(urllib.parse.urlparse(full).path)
                  text_name = text.strip()
                  ext = os.path.splitext(urllib.parse.unquote(url_name))[1]
                  filename = safe_name(text_name if os.path.splitext(text_name)[1].lower() in EXTENSIONS else urllib.parse.unquote(url_name))
                  if not os.path.splitext(filename)[1] and ext:
                      filename += ext
                  destination = stage_dir / filename
                  counter = 2
                  while destination.exists():
                      stem, suffix = os.path.splitext(filename)
                      destination = stage_dir / f'{stem}_{counter}{suffix}'
                      counter += 1
                  status = 'success'
                  error = ''
                  size = 0
                  try:
                      with request(full) as response, open(destination, 'wb') as output:
                          data = response.read()
                          output.write(data)
                          size = len(data)
                      if size == 0:
                          raise RuntimeError('empty file')
                  except Exception as exc:
                      status = 'failed'
                      error = str(exc)
                      if destination.exists():
                          destination.unlink()
                  row = [stage, destination.name, full, status, size, error]
                  rows.append(row)
                  all_manifest.append(row)
                  print(stage, status, destination.name, size)
                  time.sleep(0.15)
              with open(stage_dir / 'manifest.csv', 'w', newline='', encoding='utf-8-sig') as f:
                  writer = csv.writer(f)
                  writer.writerow(['stage', 'filename', 'source_url', 'status', 'size_bytes', 'error'])
                  writer.writerows(rows)
              with open(stage_dir / 'README.txt', 'w', encoding='utf-8') as f:
                  ok = sum(1 for r in rows if r[3] == 'success')
                  fail = sum(1 for r in rows if r[3] == 'failed')
                  f.write(f'SBIR 官方文件自動封存\n來源：{page_url}\n成功：{ok}\n失敗：{fail}\n下載日期：2026-07-22\n')

          with open(OUT / 'manifest_all.csv', 'w', newline='', encoding='utf-8-sig') as f:
              writer = csv.writer(f)
              writer.writerow(['stage', 'filename', 'source_url', 'status', 'size_bytes', 'error'])
              writer.writerows(all_manifest)

          failures = [r for r in all_manifest if r[3] != 'success']
          if failures:
              print(f'WARNING: {len(failures)} downloads failed; manifests retained for review.')
          PY

      - name: Upload application-stage archive
        uses: actions/upload-artifact@v4
        with:
          name: sbir-application-stage
          path: sbir_official_documents/01_申請階段
          if-no-files-found: error
          retention-days: 7

      - name: Upload contract-stage archive
        uses: actions/upload-artifact@v4
        with:
          name: sbir-contract-stage
          path: sbir_official_documents/02_簽約階段
          if-no-files-found: error
          retention-days: 7

      - name: Upload execution-stage archive
        uses: actions/upload-artifact@v4
        with:
          name: sbir-execution-stage
          path: sbir_official_documents/03_執行階段
          if-no-files-found: error
          retention-days: 7
